<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Orkestra Mesh · Agent Registry</title>
<meta name="viewport" content="width=1440,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Orkestra Mesh — Agent Registry */

:root {
  /* Warm near-black palette */
  --bg: oklch(0.16 0.004 80);
  --bg-1: oklch(0.185 0.004 80);
  --bg-2: oklch(0.21 0.005 80);
  --bg-3: oklch(0.24 0.005 80);
  --bg-hover: oklch(0.225 0.005 80);

  --line: oklch(0.28 0.006 80);
  --line-2: oklch(0.33 0.007 80);

  --fg: oklch(0.96 0.004 85);
  --fg-1: oklch(0.82 0.005 85);
  --fg-2: oklch(0.62 0.006 85);
  --fg-3: oklch(0.48 0.006 85);

  /* Signal accents */
  --accent: oklch(0.78 0.17 145);       /* signal green  */
  --accent-dim: oklch(0.52 0.12 145);
  --accent-bg: oklch(0.26 0.07 145);

  --warn: oklch(0.82 0.15 75);          /* amber */
  --warn-bg: oklch(0.28 0.07 75);

  --danger: oklch(0.70 0.19 25);        /* muted red */
  --danger-bg: oklch(0.26 0.08 25);

  --info: oklch(0.78 0.13 235);         /* cool steel */
  --info-bg: oklch(0.26 0.06 235);

  --mauve: oklch(0.72 0.12 305);
  --mauve-bg: oklch(0.26 0.06 305);

  --radius: 4px;
  --radius-lg: 6px;

  --font-sans: "Geist", "Inter Tight", system-ui, sans-serif;
  --font-mono: "Geist Mono", "JetBrains Mono", ui-monospace, monospace;

  --row-h: 40px;
}

[data-density="compact"] {
  --row-h: 32px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--fg);
  font-family: var(--font-sans);
  font-feature-settings: "cv11", "ss01", "ss03";
  font-size: 13px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow: hidden;
}

button, input, select { font-family: inherit; font-size: inherit; color: inherit; }
button { background: none; border: none; cursor: pointer; padding: 0; }

.mono { font-family: var(--font-mono); font-feature-settings: normal; }

/* App shell */
.app {
  display: grid;
  grid-template-columns: 224px 1fr;
  grid-template-rows: 100vh;
  height: 100vh;
  width: 100vw;
}

/* ---------- Nav rail ---------- */
.nav {
  background: var(--bg);
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.nav-header {
  padding: 14px 14px 12px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 22px;
  height: 22px;
  position: relative;
  flex-shrink: 0;
}
.logo-mark svg { display: block; }

.logo-text {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.02em;
  color: var(--fg);
}
.logo-text .mesh { color: var(--fg-2); }

.nav-env {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-2);
  padding: 2px 6px;
  border: 1px solid var(--line);
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.nav-section {
  padding: 16px 10px 6px;
}
.nav-section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--fg-3);
  padding: 0 8px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 6px 8px;
  border-radius: 3px;
  color: var(--fg-1);
  cursor: pointer;
  font-size: 12.5px;
  height: 28px;
  white-space: nowrap;
}
.nav-item:hover { background: var(--bg-1); color: var(--fg); }
.nav-item.active {
  background: var(--bg-2);
  color: var(--fg);
}
.nav-item.active::before {
  content: "";
  width: 2px; height: 14px;
  background: var(--accent);
  margin-left: -8px;
  margin-right: 4px;
  border-radius: 1px;
}
.nav-item.active:not(:has(.nav-count))::before { margin-right: 6px; }

.nav-item .ico {
  width: 14px; height: 14px;
  color: var(--fg-2);
  flex-shrink: 0;
}
.nav-item.active .ico { color: var(--fg); }
.nav-count {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-3);
}

.nav-footer {
  margin-top: auto;
  border-top: 1px solid var(--line);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 9px;
  font-size: 11.5px;
  color: var(--fg-2);
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 20%, transparent);
}
.status-dot.warn { background: var(--warn); box-shadow: 0 0 0 3px color-mix(in oklch, var(--warn) 20%, transparent); }

/* ---------- Main pane ---------- */
.main {
  display: grid;
  grid-template-rows: auto 1fr;
  min-width: 0;
  min-height: 0;
  background: var(--bg-1);
  border-left: 1px solid var(--line);
}

.topbar {
  display: flex;
  align-items: center;
  gap: 14px;
  height: 44px;
  padding: 0 16px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
  white-space: nowrap;
  flex-shrink: 0;
}
.breadcrumb .sep { color: var(--fg-3); }
.breadcrumb .cur { color: var(--fg); }

.topbar-spacer { flex: 1; }

.kbd {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 2px 5px;
  border: 1px solid var(--line);
  border-radius: 3px;
  background: var(--bg-1);
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-2);
}

.icon-btn {
  width: 28px; height: 28px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  border-radius: 3px;
  color: var(--fg-1);
  background: var(--bg-1);
}
.icon-btn:hover { background: var(--bg-2); border-color: var(--line-2); color: var(--fg); }

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 28px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 3px;
  background: var(--bg-1);
  color: var(--fg);
  font-size: 12px;
  white-space: nowrap;
}
.btn:hover { background: var(--bg-2); border-color: var(--line-2); }
.btn-primary {
  background: var(--accent);
  color: oklch(0.15 0.03 145);
  border-color: var(--accent);
  font-weight: 500;
}
.btn-primary:hover { background: oklch(0.82 0.17 145); color: oklch(0.12 0.03 145); }
.btn-ghost { background: transparent; border-color: transparent; color: var(--fg-1); }
.btn-ghost:hover { background: var(--bg-2); color: var(--fg); border-color: var(--line); }

.btn .kbd { border: none; background: transparent; padding: 0; color: var(--fg-2); }

/* ---------- Banner ---------- */
.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: oklch(0.24 0.06 75);
  border-bottom: 1px solid oklch(0.34 0.08 75);
  font-size: 12px;
  color: var(--warn);
}
.banner strong { color: oklch(0.92 0.09 75); font-weight: 500; }
.banner .banner-dismiss { margin-left: auto; color: var(--fg-2); font-family: var(--font-mono); font-size: 11px; }
.banner .banner-dismiss:hover { color: var(--fg); }

/* ---------- Content split ---------- */
.split {
  display: grid;
  grid-template-columns: minmax(400px, 1fr) minmax(0, 1.35fr);
  min-height: 0;
}

/* ---------- List pane ---------- */
.list-pane {
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  border-right: 1px solid var(--line);
  min-width: 0;
  min-height: 0;
  background: var(--bg);
}

.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 10px;
  gap: 10px;
}
.list-title {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.list-title h1 {
  margin: 0;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.005em;
}
.list-title .count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
}

.filter-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px 10px;
  flex-wrap: wrap;
}

.search {
  position: relative;
  flex: 1;
  min-width: 200px;
  max-width: 320px;
}
.search input {
  width: 100%;
  height: 28px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 0 28px 0 28px;
  color: var(--fg);
  font-size: 12px;
  outline: none;
}
.search input:focus { border-color: var(--line-2); background: var(--bg-2); }
.search input::placeholder { color: var(--fg-3); }
.search .search-ico { position: absolute; left: 8px; top: 7px; color: var(--fg-3); }
.search .search-kbd { position: absolute; right: 6px; top: 6px; }

.chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 24px;
  padding: 0 8px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 3px;
  font-size: 11.5px;
  color: var(--fg-1);
  cursor: pointer;
  white-space: nowrap;
}
.chip:hover { background: var(--bg-2); }
.chip.active { background: var(--bg-2); border-color: var(--line-2); color: var(--fg); }
.chip .chip-k { color: var(--fg-3); font-family: var(--font-mono); font-size: 10.5px; }

/* Table */
.list-scroll {
  overflow: auto;
  min-height: 0;
}

.table {
  width: 100%;
  border-collapse: collapse;
}
.table thead th {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
  padding: 6px 12px;
  text-align: left;
  font-weight: 500;
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
  z-index: 1;
  height: 28px;
}
.table tbody tr {
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  height: var(--row-h);
}
.table tbody tr:hover { background: var(--bg-1); }
.table tbody tr.selected { background: var(--bg-2); }
.table tbody tr.selected td:first-child { box-shadow: inset 2px 0 0 var(--accent); }

.table td {
  padding: 0 12px;
  vertical-align: middle;
}

.cell-name {
  display: flex;
  align-items: center;
  gap: 10px;
}
.agent-icon {
  width: 22px; height: 22px;
  border-radius: 3px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-1);
  flex-shrink: 0;
}
.cell-name .main-name { color: var(--fg); font-weight: 500; font-size: 12.5px; white-space: nowrap; }
.cell-name .sub-name { color: var(--fg-3); font-family: var(--font-mono); font-size: 10.5px; margin-left: 4px; white-space: nowrap; }
.cell-name > div { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.cell-family {
  font-family: var(--font-mono);
  color: var(--fg-1);
  font-size: 11.5px;
  white-space: nowrap;
}
.cell-time { white-space: nowrap; }

.cell-num {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--fg-1);
  text-align: right;
}
.cell-num .dim { color: var(--fg-3); }

.cell-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-2);
}

/* Lifecycle badges */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 20px;
  padding: 0 7px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: lowercase;
  letter-spacing: 0.02em;
  border: 1px solid transparent;
  white-space: nowrap;
}
.badge::before {
  content: "";
  width: 5px; height: 5px; border-radius: 50%;
  background: currentColor;
}
.badge.b-draft { color: var(--fg-2); background: var(--bg-2); border-color: var(--line); }
.badge.b-designed { color: var(--mauve); background: var(--mauve-bg); border-color: color-mix(in oklch, var(--mauve) 25%, transparent); }
.badge.b-tested { color: var(--info); background: var(--info-bg); border-color: color-mix(in oklch, var(--info) 25%, transparent); }
.badge.b-registered { color: oklch(0.78 0.13 200); background: oklch(0.26 0.06 200); border-color: color-mix(in oklch, oklch(0.78 0.13 200) 25%, transparent); }
.badge.b-active { color: var(--accent); background: var(--accent-bg); border-color: color-mix(in oklch, var(--accent) 25%, transparent); }
.badge.b-deprecated { color: var(--warn); background: var(--warn-bg); border-color: color-mix(in oklch, var(--warn) 25%, transparent); }
.badge.b-disabled { color: var(--danger); background: var(--danger-bg); border-color: color-mix(in oklch, var(--danger) 25%, transparent); }
.badge.b-archived { color: var(--fg-3); background: var(--bg-2); border-color: var(--line); }

.badge.outline { background: transparent; }

/* Score pill */
.score {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-1);
}
.score-bar {
  width: 42px;
  height: 4px;
  background: var(--bg-3);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}
.score-bar > span {
  display: block;
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
}
.score.s-mid .score-bar > span { background: var(--warn); }
.score.s-low .score-bar > span { background: var(--danger); }
.score.s-none { color: var(--fg-3); }
.score.s-none .score-bar { opacity: 0; }

/* List footer */
.list-footer {
  border-top: 1px solid var(--line);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-2);
}
.list-footer .sep { color: var(--fg-3); }

/* ---------- Detail pane ---------- */
.detail-pane {
  display: grid;
  grid-template-rows: auto auto 1fr;
  min-height: 0;
  min-width: 0;
  background: var(--bg);
  overflow: hidden;
}

.detail-header {
  padding: 16px 20px 14px;
  border-bottom: 1px solid var(--line);
}
.detail-top-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.detail-top-row .agent-icon { width: 28px; height: 28px; font-size: 12px; }
.detail-title {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex: 1;
  min-width: 0;
}
.detail-title h2 {
  margin: 0;
  font-size: 16px;
  font-weight: 500;
  letter-spacing: -0.01em;
}
.detail-title .id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
}
.detail-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

.detail-summary {
  color: var(--fg-1);
  font-size: 13px;
  max-width: 80ch;
  margin: 6px 0 14px;
}

.meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 16px 24px;
  font-size: 11.5px;
}
.meta-row .meta-item {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.meta-row .meta-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--fg-3);
}
.meta-row .meta-value {
  color: var(--fg);
  font-family: var(--font-mono);
  font-size: 12px;
}

/* Tabs */
.tabs {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--line);
  padding: 0 12px;
  gap: 2px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  position: relative;
  padding: 0 12px;
  height: 36px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12.5px;
  color: var(--fg-2);
  white-space: nowrap;
  border-radius: 3px 3px 0 0;
}
.tab:hover { color: var(--fg); }
.tab.active { color: var(--fg); }
.tab.active::after {
  content: "";
  position: absolute;
  left: 10px; right: 10px; bottom: -1px;
  height: 2px;
  background: var(--accent);
  border-radius: 1px 1px 0 0;
}
.tab .tab-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-3);
  padding: 1px 5px;
  background: var(--bg-2);
  border-radius: 3px;
}

/* Detail body */
.detail-body {
  overflow: auto;
  min-height: 0;
  padding: 20px 20px 60px;
}

/* Scroll bars */
.detail-body::-webkit-scrollbar,
.list-scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.detail-body::-webkit-scrollbar-track,
.list-scroll::-webkit-scrollbar-track { background: transparent; }
.detail-body::-webkit-scrollbar-thumb,
.list-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; border: 2px solid var(--bg); }
.detail-body::-webkit-scrollbar-thumb:hover,
.list-scroll::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

/* Card */
.card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--bg);
}
.card-head h3 {
  margin: 0;
  font-size: 12.5px;
  font-weight: 500;
  letter-spacing: 0;
  color: var(--fg);
}
.card-head .card-sub {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-3);
}
.card-head .card-actions { margin-left: auto; display: flex; gap: 6px; }
.card-body { padding: 14px; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.stack { display: grid; gap: 16px; }

/* ---------- Lifecycle viz ---------- */
.lifecycle {
  padding: 20px 16px;
  background:
    radial-gradient(circle at 20% 0%, oklch(0.23 0.02 145) 0%, transparent 40%),
    radial-gradient(circle at 80% 100%, oklch(0.22 0.02 75) 0%, transparent 50%),
    var(--bg-1);
}
.lifecycle-track {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  position: relative;
  gap: 0;
}
.lifecycle-node {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.lifecycle-dot {
  position: relative;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--bg-2);
  border: 1.5px solid var(--line-2);
  z-index: 1;
}
.lifecycle-node.done .lifecycle-dot {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent) 18%, transparent);
}
.lifecycle-node.done .lifecycle-dot::before {
  content: "";
  position: absolute;
  inset: 3px;
  background: oklch(0.15 0.03 145);
  clip-path: polygon(20% 50%, 40% 70%, 80% 25%, 70% 18%, 40% 55%, 30% 42%);
}
.lifecycle-node.current .lifecycle-dot {
  background: var(--bg);
  border: 2.5px solid var(--accent);
  box-shadow: 0 0 0 4px color-mix(in oklch, var(--accent) 22%, transparent);
}
.lifecycle-node.current .lifecycle-dot::after {
  content: "";
  position: absolute;
  inset: -9px;
  border-radius: 50%;
  border: 1px solid color-mix(in oklch, var(--accent) 40%, transparent);
  animation: pulse 2.4s ease-out infinite;
}
@keyframes pulse {
  0% { transform: scale(0.7); opacity: 0.8; }
  100% { transform: scale(1.6); opacity: 0; }
}
.lifecycle-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-2);
  text-align: center;
}
.lifecycle-node.done .lifecycle-label { color: var(--fg-1); }
.lifecycle-node.current .lifecycle-label { color: var(--fg); font-weight: 500; }

.lifecycle-line {
  position: absolute;
  top: 6.5px;
  left: 7%;
  right: 7%;
  height: 1.5px;
  background: linear-gradient(90deg, var(--accent) var(--progress, 0%), var(--line-2) var(--progress, 0%));
  z-index: 0;
}

.lifecycle-meta {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-2);
}
.lifecycle-meta .lm-cell { display: flex; flex-direction: column; gap: 4px; }
.lifecycle-meta .lm-label { font-size: 10px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; }
.lifecycle-meta .lm-value { color: var(--fg); font-size: 11.5px; }

.lifecycle-cta {
  display: flex;
  gap: 8px;
  align-items: center;
}

/* ---------- KV list ---------- */
.kv {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 0;
  font-size: 12.5px;
}
.kv > dt {
  padding: 8px 0;
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
  border-bottom: 1px dashed var(--line);
}
.kv > dd {
  margin: 0;
  padding: 8px 0;
  color: var(--fg);
  border-bottom: 1px dashed var(--line);
  font-size: 12.5px;
}
.kv > dt:last-of-type, .kv > dd:last-of-type { border-bottom: none; }

/* ---------- Prompt pipeline ---------- */
.pipeline {
  display: grid;
  gap: 0;
}
.pipe-layer {
  position: relative;
  display: grid;
  grid-template-columns: 26px 150px 1fr auto;
  gap: 14px;
  padding: 10px 14px 10px 10px;
  border-bottom: 1px solid var(--line);
  align-items: center;
  cursor: pointer;
}
.pipe-layer:last-child { border-bottom: none; }
.pipe-layer:hover { background: var(--bg-2); }
.pipe-num {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-3);
  text-align: right;
}
.pipe-name {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg);
}
.pipe-desc {
  font-size: 11.5px;
  color: var(--fg-2);
}
.pipe-size {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-3);
}
.pipe-layer.has-preview::before {
  content: "";
  position: absolute;
  left: 21px;
  top: 50%;
  bottom: -12px;
  width: 1px;
  background: var(--line);
}
.pipe-preview {
  background: var(--bg);
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.6;
  color: var(--fg-1);
  white-space: pre-wrap;
  padding: 12px 14px 12px 46px;
  overflow: hidden;
  max-height: 0;
  transition: max-height 0.2s ease, padding 0.2s ease, border-color 0.2s ease;
  border-color: transparent;
}
.pipe-layer.expanded + .pipe-preview {
  max-height: 220px;
  padding: 12px 14px 12px 46px;
  border-color: var(--line);
  overflow: auto;
}
.pipe-preview .ghost { color: var(--fg-3); }
.pipe-chev {
  color: var(--fg-3);
  transition: transform 0.2s ease;
  margin-left: 4px;
}
.pipe-layer.expanded .pipe-chev { transform: rotate(90deg); color: var(--fg-1); }

/* ---------- MCP tools list ---------- */
.mcp-group {
  border-bottom: 1px solid var(--line);
}
.mcp-group:last-child { border-bottom: none; }
.mcp-group-head {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: var(--bg);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-1);
}
.mcp-group-head .mcp-host { color: var(--fg); }
.mcp-group-head .mcp-count { color: var(--fg-3); margin-left: 6px; }
.mcp-group-head .mcp-group-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; font-size: 11px; }
.mcp-group-head .mcp-group-actions a { color: var(--fg-2); cursor: pointer; }
.mcp-group-head .mcp-group-actions a:hover { color: var(--fg); }

.mcp-tool {
  display: grid;
  grid-template-columns: 18px 1fr 120px 44px;
  align-items: center;
  gap: 12px;
  padding: 9px 14px;
  border-top: 1px solid var(--line);
  font-size: 12px;
  cursor: pointer;
}
.mcp-tool:hover { background: var(--bg-2); }
.mcp-tool .mcp-ico { color: var(--fg-3); }
.mcp-tool.enabled .mcp-ico { color: var(--accent); }
.mcp-tool .mcp-name {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg);
}
.mcp-tool .mcp-name .muted { color: var(--fg-3); }
.mcp-tool .mcp-desc {
  font-size: 11.5px;
  color: var(--fg-2);
  margin-top: 2px;
}
.mcp-tool .mcp-scope {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-2);
  text-align: right;
}
.mcp-tool.disabled { opacity: 0.55; }
.mcp-tool.disabled .mcp-name { color: var(--fg-2); }

/* Switch */
.switch {
  width: 26px; height: 14px;
  background: var(--bg-3);
  border-radius: 7px;
  position: relative;
  transition: background 0.15s ease;
  flex-shrink: 0;
  border: 1px solid var(--line-2);
  cursor: pointer;
}
.switch::after {
  content: "";
  position: absolute;
  top: 1px; left: 1px;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--fg-2);
  transition: all 0.15s ease;
}
.switch.on {
  background: var(--accent);
  border-color: var(--accent);
}
.switch.on::after {
  left: 13px;
  background: oklch(0.15 0.03 145);
}

/* ---------- Skills chips ---------- */
.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.chip-skill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  height: 24px;
  padding: 0 8px 0 6px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-1);
}
.chip-skill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--mauve); }

/* ---------- Audit log ---------- */
.audit-list {
  display: grid;
  gap: 0;
}
.audit-row {
  display: grid;
  grid-template-columns: 110px 22px 1fr auto;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 16px 10px 14px;
  border-bottom: 1px solid var(--line);
  position: relative;
  font-size: 12px;
}
.audit-row:last-child { border-bottom: none; }
.audit-time {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
}
.audit-bullet {
  width: 8px; height: 8px; border-radius: 50%;
  margin-top: 4px; margin-left: 6px;
  background: var(--fg-3);
}
.audit-bullet.b-active { background: var(--accent); }
.audit-bullet.b-info { background: var(--info); }
.audit-bullet.b-warn { background: var(--warn); }
.audit-bullet.b-mauve { background: var(--mauve); }
.audit-msg { color: var(--fg); }
.audit-msg .mono { color: var(--fg-1); background: var(--bg-2); padding: 0 5px; border-radius: 3px; }
.audit-who { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
.audit-row::before {
  content: "";
  position: absolute;
  left: 130px;
  top: 26px;
  bottom: -10px;
  width: 1px;
  background: var(--line);
}
.audit-row:last-child::before { display: none; }

/* ---------- Test Lab panel ---------- */
.verdicts {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}
.verdict {
  padding: 14px;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.verdict:last-child { border-right: none; }
.verdict-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--fg-3);
}
.verdict-value {
  font-family: var(--font-mono);
  font-size: 20px;
  color: var(--fg);
  font-weight: 400;
  letter-spacing: -0.01em;
}
.verdict-value .unit { font-size: 12px; color: var(--fg-3); margin-left: 3px; }
.verdict-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-2);
  white-space: nowrap;
}
.delta { font-family: var(--font-mono); font-size: 10.5px; }
.delta.up { color: var(--accent); }
.delta.down { color: var(--danger); }

/* Tweaks panel */
.tweaks {
  position: fixed;
  bottom: 16px;
  right: 16px;
  width: 256px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 6px;
  box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 2px 0 rgba(255,255,255,0.02) inset;
  z-index: 50;
  display: none;
  overflow: hidden;
  font-size: 12px;
}
.tweaks.open { display: block; }
.tweaks-head {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg);
}
.tweaks-head .tweaks-dismiss { margin-left: auto; color: var(--fg-3); }
.tweaks-head .tweaks-dismiss:hover { color: var(--fg); }
.tweaks-body { padding: 10px 12px 12px; display: grid; gap: 12px; }
.tweak-row { display: grid; gap: 5px; }
.tweak-label { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); text-transform: uppercase; letter-spacing: 0.06em; }
.segmented {
  display: flex;
  border: 1px solid var(--line);
  border-radius: 3px;
  overflow: hidden;
  background: var(--bg);
}
.segmented button {
  flex: 1;
  height: 26px;
  font-size: 11.5px;
  color: var(--fg-2);
  background: transparent;
  border-right: 1px solid var(--line);
}
.segmented button:last-child { border-right: none; }
.segmented button.sel { background: var(--bg-2); color: var(--fg); }
.segmented button:hover:not(.sel) { color: var(--fg); background: var(--bg-1); }

.swatches { display: flex; gap: 6px; }
.swatch {
  width: 26px; height: 26px; border-radius: 3px;
  border: 1px solid var(--line);
  cursor: pointer;
  position: relative;
}
.swatch.sel { outline: 1.5px solid var(--fg-1); outline-offset: 1px; }

/* Test Lab page */
.testlab {
  display: grid;
  grid-template-columns: 320px 1fr;
  min-height: 0;
  height: 100%;
}

.scenario-list {
  border-right: 1px solid var(--line);
  overflow: auto;
  background: var(--bg);
}
.scenario-list .sl-head {
  padding: 12px 14px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--line);
}
.scenario-list .sl-head h2 { margin: 0; font-size: 12.5px; font-weight: 500; }
.scenario-item {
  padding: 10px 14px;
  border-bottom: 1px solid var(--line);
  cursor: pointer;
  display: grid;
  gap: 4px;
}
.scenario-item:hover { background: var(--bg-1); }
.scenario-item.active { background: var(--bg-2); box-shadow: inset 2px 0 0 var(--accent); }
.scenario-name { font-size: 12.5px; color: var(--fg); font-weight: 500; }
.scenario-id { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); }
.scenario-foot { display: flex; gap: 10px; margin-top: 4px; align-items: center; }
.scenario-foot .mini { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-2); white-space: nowrap; }

.routing {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--line-2);
  color: var(--fg-2);
}
.routing--sequential { color: var(--info); border-color: color-mix(in oklch, var(--info) 30%, var(--line)); background: color-mix(in oklch, var(--info) 8%, transparent); }
.routing--dynamic    { color: var(--mauve); border-color: color-mix(in oklch, var(--mauve) 30%, var(--line)); background: color-mix(in oklch, var(--mauve) 8%, transparent); }

.forbidden__item {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 7px;
  border-radius: 3px;
  background: color-mix(in oklch, var(--danger) 10%, var(--bg));
  border: 1px solid color-mix(in oklch, var(--danger) 30%, var(--line));
  color: color-mix(in oklch, var(--danger) 90%, var(--fg));
}

.testrun {
  display: grid;
  grid-template-rows: auto auto 1fr;
  overflow: hidden;
  min-height: 0;
}
.testrun-head {
  padding: 14px 20px;
  border-bottom: 1px solid var(--line);
}
.testrun-body {
  padding: 16px 20px;
  overflow: auto;
  display: grid;
  gap: 16px;
  min-height: 0;
}

.stream-line {
  font-family: var(--font-mono);
  font-size: 11.5px;
  padding: 2px 0;
  color: var(--fg-1);
  display: grid;
  grid-template-columns: 100px 60px 1fr;
  gap: 12px;
  align-items: baseline;
}
.stream-line .ts { color: var(--fg-3); white-space: nowrap; }
.stream-line .lvl { color: var(--fg-2); white-space: nowrap; }
.stream-line .lvl.info { color: var(--info); }
.stream-line .lvl.judge { color: var(--accent); }
.stream-line .lvl.policy { color: var(--mauve); }
.stream-line .lvl.robust { color: var(--warn); }
.stream-line .lvl.tool { color: oklch(0.78 0.13 200); }

.caret {
  display: inline-block;
  width: 7px; height: 12px;
  background: var(--accent);
  margin-left: 4px;
  vertical-align: -2px;
  animation: blink 1s steps(2, start) infinite;
}
@keyframes blink { to { visibility: hidden; } }

/* Utility */
.hrule { height: 1px; background: var(--line); margin: 10px 0; }
.muted { color: var(--fg-2); }
.dim { color: var(--fg-3); }

/* Transitions for tab content */
.tab-content { animation: fade 0.15s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(2px); } to { opacity: 1; transform: none; } }

/* Focus visible */
:focus-visible { outline: 1.5px solid var(--accent); outline-offset: 1px; border-radius: 2px; }

</style>

// Lifecycle state machine visualization
const LIFECYCLE = window.LIFECYCLE_STATES;

const stateIndex = (s) => {
  const i = LIFECYCLE.indexOf(s);
  return i === -1 ? 0 : i;
};

const Lifecycle = ({ state, history = [], onPromote }) => {
  const curIdx = stateIndex(state);
  const progress = (curIdx / (LIFECYCLE.length - 1)) * 100;
  const nextState = LIFECYCLE[curIdx + 1];
  const doneStates = new Set(history.map(h => h.state));

  return (
    <div className="card">
      <div className="card-head">
        <h3>Lifecycle</h3>
        <span className="card-sub">state machine · transitions are append-only</span>
        <div className="card-actions">
          {nextState && nextState !== "deprecated" && nextState !== "archived" ? (
            <button className="btn btn-primary" onClick={() => onPromote(nextState)}>
              Promote → {nextState}
            </button>
          ) : null}
          <button className="btn btn-ghost"><Ico name="dots"/></button>
        </div>
      </div>
      <div className="lifecycle">
        <div className="lifecycle-track">
          <div className="lifecycle-line" style={{ "--progress": `${progress}%` }}/>
          {LIFECYCLE.map((s, i) => {
            const cls = i < curIdx || doneStates.has(s) ? "done" : (i === curIdx ? "current" : "");
            return (
              <div key={s} className={"lifecycle-node " + cls}>
                <div className="lifecycle-dot"/>
                <div className="lifecycle-label">{s}</div>
              </div>
            );
          })}
        </div>

        <div className="lifecycle-meta">
          <div className="lm-cell">
            <span className="lm-label">Current</span>
            <span className="lm-value">{state}</span>
          </div>
          <div className="lm-cell">
            <span className="lm-label">Promoted at</span>
            <span className="lm-value">{history.filter(h => h.state === state)[0]?.when || "—"}</span>
          </div>
          <div className="lm-cell">
            <span className="lm-label">Promoted by</span>
            <span className="lm-value">{history.filter(h => h.state === state)[0]?.by || "—"}</span>
          </div>
          <div className="lm-cell">
            <span className="lm-label">Gates</span>
            <span className="lm-value">{curIdx >= 2 ? "tests ✓" : "pending"} · {curIdx >= 3 ? "approval ✓" : "pending"}</span>
          </div>
        </div>
      </div>
    </div>
  );
};

    { k: "ORKESTRA_ENV", v: "dev" },
    { k: "ORKESTRA_AUTH_ENABLED", v: "false" },
    { k: "ORKESTRA_DB_URL", v: "postgres://***@db:5432/orkestra" },
    { k: "ORKESTRA_REDIS_URL", v: "redis://redis:6379/0" },
    { k: "FERNET_KEY", v: "kH8…(ephemeral, rotates on restart)" },
    { k: "OBOT_ENDPOINT", v: "https://obot.internal:8443" },
  ];

  const addProvider = (p) => setProviders(xs => [...xs, p]);
  const rmProvider  = (id) => setProviders(xs => xs.filter(p => p.id !== id));
  const setRoleModel = (rid, patch) => setRoles(rs => rs.map(r => r.id === rid ? { ...r, ...patch } : r));

  return (
    <div>
      <PageHead title="Admin" sub="Users, LLM providers, default models, and operational settings for this cluster." actions={<><button className="btn btn-ghost">export config</button><button className="btn btn-primary"><Ico name="plus" size={13}/> Invite user</button></>}/>
      <div style={{ padding: 20, display: "grid", gap: 14 }}>

        <Section title={`LLM providers · ${providers.length}`} right={<button className="btn btn-primary" style={{ fontSize: 11 }} onClick={() => setAddOpen(true)}><Ico name="plus" size={12}/> Add provider</button>}>
          <div>
            {providers.map(p => (
              <div key={p.id} style={{ display: "grid", gridTemplateColumns: "26px 180px 1fr 160px 100px 70px", gap: 12, alignItems: "center", padding: "10px 14px", borderTop: "1px solid var(--line)" }}>
                {providerIcon(p.kind)}
                <div>
                  <div style={{ color: "var(--fg)", fontSize: 13, fontWeight: 500 }}>{p.name}</div>
                  <div className="mono" style={{ fontSize: 10.5, color: "var(--fg-3)" }}>{p.id}</div>
                </div>
                <div className="mono" style={{ fontSize: 11.5, color: "var(--fg-2)", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.endpoint}</div>
                <div style={{ fontSize: 11.5, color: "var(--fg-2)" }}>{p.models.length} models</div>
                <span className={"badge " + (p.status === "connected" ? "b-active" : p.status === "degraded" ? "b-deprecated" : "b-draft")}>{p.status}</span>
                <div style={{ display: "flex", gap: 4, justifyContent: "flex-end" }}>
                  <button className="btn btn-ghost" style={{ fontSize: 11 }}>edit</button>
                  <button className="btn btn-ghost" style={{ fontSize: 11 }} onClick={() => rmProvider(p.id)}>✕</button>
                </div>
              </div>
            ))}
          </div>
        </Section>

        <Section title="Default models · by role" right={<span style={{ fontFamily: "var(--font-mono)", fontSize: 10.5, color: "var(--fg-3)" }}>applied at agent / orchestrator instantiation</span>}>
          <table className="table" style={{ tableLayout: "fixed" }}>
            <thead><tr><th style={{ width: 220 }}>role</th><th>default model</th><th style={{ width: 80 }}>temp</th><th style={{ width: 100 }}>max tokens</th><th style={{ width: 70 }}></th></tr></thead>
            <tbody>
              {roles.map(r => (
                <tr key={r.id}>
                  <td>
                    <div style={{ color: "var(--fg)", fontSize: 12.5 }}>{r.label}</div>
                    <div className="mono" style={{ fontSize: 10.5, color: "var(--fg-3)" }}>{r.id}</div>
                  </td>
                  <td>
                    <div className="mono" style={{ color: "var(--fg)", fontSize: 12 }}>{r.model}</div>
                    <div style={{ fontSize: 11, color: "var(--fg-2)", marginTop: 2 }}>{r.desc}</div>
                  </td>
                  <td className="mono">{r.temp.toFixed(2)}</td>
                  <td className="mono">{r.maxTokens.toLocaleString()}</td>
                  <td><button className="btn btn-ghost" style={{ fontSize: 11 }} onClick={() => setEditRole(r)}>change</button></td>
                </tr>
              ))}
            </tbody>
          </table>
        </Section>

        <Section title="Users · 5">
          <table className="table"><thead><tr><th>email</th><th>role</th><th>agents owned</th><th>last seen</th><th style={{ width: 60 }}></th></tr></thead>
            <tbody>{users.map(u => <tr key={u.email}><td className="mono" style={{ color: "var(--fg)" }}>{u.email}</td><td><span className={"badge " + (u.role === "admin" ? "b-active" : u.role === "reviewer" ? "b-tested" : "b-designed")}>{u.role}</span></td><td className="mono">{u.agents}</td><td className="mono" style={{ color: "var(--fg-2)" }}>{u.last}</td><td><button className="btn btn-ghost"><Ico name="dots" size={12}/></button></td></tr>)}</tbody>
          </table>
        </Section>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
          <Section title="Environment" right={<span style={{ fontFamily: "var(--font-mono)", fontSize: 10.5, color: "var(--warn)" }}>dev · auth disabled</span>}>
            <table className="table"><tbody>{env.map(e => <tr key={e.k}><td className="mono" style={{ color: "var(--fg)", width: 240 }}>{e.k}</td><td className="mono" style={{ color: "var(--fg-2)" }}>{e.v}</td></tr>)}</tbody></table>
          </Section>

          <Section title="Cluster components">
            <div style={{ padding: 14, display: "grid", gap: 8 }}>
              {[
                { k: "api",      desc: "FastAPI / uvicorn · :8000",   status: "healthy"  },
                { k: "worker",   desc: "Celery · scenario runner",    status: "healthy"  },
                { k: "postgres", desc: "Agents, scenarios, audit.",   status: "healthy"  },
                { k: "redis",    desc: "Job queue + cache.",          status: "healthy"  },
                { k: "obot",     desc: "MCP gateway.",                status: "healthy"  },
                { k: "slack.obot",desc: "MCP host — slack connector.",status: "degraded" },
              ].map(c => (
                <div key={c.k} style={{ display: "grid", gridTemplateColumns: "120px 1fr auto", gap: 10, alignItems: "center", padding: "6px 4px" }}>
                  <span className="mono" style={{ color: "var(--fg)" }}>{c.k}</span>
                  <span style={{ color: "var(--fg-1)", fontSize: 12 }}>{c.desc}</span>
                  <span className={"badge " + (c.status === "healthy" ? "b-active" : "b-deprecated")}>{c.status}</span>
                </div>
              ))}
            </div>
          </Section>
        </div>
      </div>

      <AddProviderModal open={addOpen} onClose={() => setAddOpen(false)} onAdd={addProvider}/>
      <SetModelModal open={!!editRole} onClose={() => setEditRole(null)} role={editRole} providers={providers} onSet={setRoleModel}/>
    </div>
  );
};

window.DashboardPage = DashboardPage;
window.OrchestratorsPage = OrchestratorsPage;
window.FamiliesPage = FamiliesPage;
window.SkillsPage = SkillsPage;
window.TestLabPage = TestLabPage;
window.TestLabConfigPage = TestLabConfigPage;
window.MCPPage = MCPPage;
window.AdminPage = AdminPage;

// App shell
const { useState, useEffect, useMemo, useRef } = React;

const App = () => {
  const [agents, setAgents] = useState(window.AGENTS);
  const [selectedId, setSelectedId] = useState("agt_s3k4x");
  const [filter, setFilter] = useState("");
  const [stateFilter, setStateFilter] = useState("all");
  const [section, setSection] = useState(() => {
    try { return localStorage.getItem("orkestra.section") || "registry"; } catch { return "registry"; }
  });
  React.useEffect(() => { try { localStorage.setItem("orkestra.section", section); } catch {} }, [section]);

  // Tweaks
  const [tweakOpen, setTweakOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  // Security banner dismissable
  const [bannerDismissed, setBannerDismissed] = useState(false);

  // Test run state
  const [runState, setRunState] = useState({ isRunning: false, streamLines: [], lastScore: null });

  const selected = agents.find(a => a.id === selectedId);

  // Apply tweaks to document
  useEffect(() => {
    document.documentElement.setAttribute("data-density", tweaks.density);
    document.documentElement.style.setProperty("--accent", `oklch(0.78 0.17 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty("--accent-dim", `oklch(0.52 0.12 ${tweaks.accentHue})`);
    document.documentElement.style.setProperty("--accent-bg", `oklch(0.26 0.07 ${tweaks.accentHue})`);
  }, [tweaks]);

  // Edit mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data || typeof e.data !== "object") return;
      if (e.data.type === "__activate_edit_mode") setTweakOpen(true);
      if (e.data.type === "__deactivate_edit_mode") setTweakOpen(false);
    };
    window.addEventListener("message", onMsg);
    try { window.parent.postMessage({ type: "__edit_mode_available" }, "*"); } catch {}
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const updateTweak = (patch) => {
    setTweaks(t => ({ ...t, ...patch }));
    try {
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: patch }, "*");
    } catch {}
  };

  // Toggle MCP tool
  const toggleTool = (gi, ti) => {
    setAgents(as => as.map(a => {
      if (a.id !== selectedId) return a;
      const mcp = a.mcp.map((g, i) => {
        if (i !== gi) return g;
        const tools = g.tools.map((t, j) => j === ti ? { ...t, on: !t.on } : t);
        const enabled = tools.filter(t => t.on).length;
        return { ...g, tools, enabled };
      });
      const tools = mcp.reduce((n, g) => n + g.enabled, 0);
      return { ...a, mcp, tools };
    }));
  };

  // Promote lifecycle
  const promote = (nextState) => {
    setAgents(as => as.map(a => {
      if (a.id !== selectedId) return a;
      const entry = { state: nextState, when: "just now", by: "you", note: "manual promotion" };
      const audit = [{ t: "just now", kind: "b-active", who: "you", msg: `promoted from ${a.state} → ${nextState}.` }, ...a.audit];
      return { ...a, state: nextState, lifecycleHistory: [...(a.lifecycleHistory || []), entry], audit };
    }));
  };

  // Run suite simulation
  const runSuite = () => {
    if (runState.isRunning) return;
    setRunState({ isRunning: true, streamLines: [], lastScore: null });

    const script = [
      { lvl: "info",   msg: "scheduler: enqueued 5 scenarios to app.tasks.test_lab" },
      { lvl: "info",   msg: "sc_4m29 → instantiating agent · loading 7-layer prompt (4,218 tok)" },
      { lvl: "tool",   msg: "sc_4m29 → mcp:zendesk.obot/tickets.search(q=\"invoice #4821\") · 180ms" },
      { lvl: "tool",   msg: "sc_4m29 → mcp:kb.obot/articles.search(\"billing double-charge\") · 92ms" },
      { lvl: "judge",  msg: "sc_4m29 · judge verdict: PASS · score 0.93 · \"correctly routed to billing-escalations\"" },
      { lvl: "policy", msg: "sc_4m29 · policy checker: no denied effects · no PII leakage" },
      { lvl: "robust", msg: "sc_4m29 · robustness: stable across 3 paraphrase variants" },
      { lvl: "info",   msg: "sc_7q3a → running with PII-in-body variant" },
      { lvl: "tool",   msg: "sc_7q3a → skill:pii-redaction stripped 2 email, 1 phone" },
      { lvl: "judge",  msg: "sc_7q3a · judge verdict: PASS · score 0.88" },
      { lvl: "info",   msg: "sc_a1bf, sc_x2c9, sc_n0kk queued" },
      { lvl: "judge",  msg: "sc_a1bf · judge: partial · score 0.79 · routed to wrong queue" },
      { lvl: "judge",  msg: "sc_x2c9 · judge: PASS · score 0.95 · duplicate detected" },
      { lvl: "judge",  msg: "sc_n0kk · judge: PASS · score 0.91 · on-call path correct" },
      { lvl: "info",   msg: "run complete · 5/5 · avg judge 0.89 · avg policy 0.98 · avg robust 0.84" },
    ];

    let i = 0;
    const tick = () => {
      if (i >= script.length) {
        setRunState(s => ({ ...s, isRunning: false, lastScore: 0.89 }));
        return;
      }
      const line = { ...script[i], ts: new Date().toISOString().slice(11, 19) };
      setRunState(s => ({ ...s, streamLines: [...s.streamLines, line] }));
      i += 1;
      setTimeout(tick, 320 + Math.random() * 180);
    };
    setTimeout(tick, 250);
  };

  const counts = {
    agents: agents.length,
    scenarios: window.SCENARIOS.length + 32,
    mcp: agents.reduce((n, a) => n + a.mcp.reduce((m, g) => m + g.total, 0), 0),
  };

  return (
    <div className="app">
      <Nav active={section} onNavigate={setSection} counts={counts}/>

      <div className="main">
        <div className="topbar">
          <div className="breadcrumb">
            <span>orkestra-mesh</span>
            <span className="sep"><Ico name="chev" size={11}/></span>
            <span>{({
              dashboard: "dashboard",
              registry: "registry",
              orchestrators: "orchestrators",
              families: "families",
              skills: "skills",
              testlab: "test-lab",
              testlabconfig: "test-lab · config",
              mcp: "mcp-catalog",
              admin: "admin",
            })[section] || section}</span>
            {section === "registry" && selected && <>
              <span className="sep"><Ico name="chev" size={11}/></span>
              <span className="cur">{selected.slug}</span>
            </>}
          </div>

          <div className="topbar-spacer"/>

          <button className="btn btn-ghost"><Ico name="bell" size={13}/></button>
          <button className="btn btn-ghost" onClick={() => setTweakOpen(o => !o)}>
            <Ico name="sliders" size={13}/> Tweaks
          </button>
          <button className="btn"><Ico name="terminal" size={13}/> API <span className="kbd mono">⌘·</span></button>
        </div>

        {tweaks.showSecurityBanner && !bannerDismissed && (
          <div className="banner">
            <Ico name="alert" size={13}/>
            <span>
              <strong>dev cluster · auth disabled</strong>
              <span style={{ marginLeft: 10, color: "var(--fg-2)" }}>
                ORKESTRA_AUTH_ENABLED=false · FERNET_KEY ephemeral · default API key in repo. Do not expose on any non-localhost network.
              </span>
            </span>
            <button className="banner-dismiss" onClick={() => setBannerDismissed(true)}>dismiss</button>
          </div>
        )}

        <div className="split" style={{ display: section === "registry" ? "" : "none" }}>
          <RegistryList
            agents={agents}
            selectedId={selectedId}
            onSelect={setSelectedId}
            filter={filter}
            onFilter={setFilter}
            stateFilter={stateFilter}
            onStateFilter={setStateFilter}
          />
          <DetailPane
            agent={selected}
            onToggleTool={toggleTool}
            onPromote={promote}
            runState={runState}
            onRunSuite={runSuite}
          />
        </div>

        {section === "dashboard"     && <DashboardPage agents={agents} onGoRegistry={() => setSection("registry")}/>}
        {section === "orchestrators" && <OrchestratorsPage agents={agents}/>}
        {section === "families"      && <FamiliesPage agents={agents}/>}
        {section === "skills"        && <SkillsPage/>}
        {section === "testlab"       && <TestLabPage agents={agents}/>}
        {section === "testlabconfig" && <TestLabConfigPage/>}
        {section === "mcp"           && <MCPPage/>}
        {section === "admin"         && <AdminPage/>}
      </div>

      <Tweaks open={tweakOpen} onClose={() => setTweakOpen(false)} values={tweaks} onChange={updateTweak}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
