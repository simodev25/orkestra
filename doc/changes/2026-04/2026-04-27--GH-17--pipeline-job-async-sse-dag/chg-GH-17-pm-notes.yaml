blockers: []

notes:
  - text: "Analyse architecturale complète fournie par @architect avant la spec. Pyramide de timeouts incohérents identifiée (MCP=30s/stage=90s/API=120s/synthèse=35s). DAG recommandé: discover → (mobility ∥ weather) → budget_fit."
    type: "info"
    date: "2026-04-27"
  - text: "GH-16 (fix timeout/max_iters) déjà livré — commit d048269. GH-17 est la refonte cible."
    type: "info"
    date: "2026-04-27"
  - text: "Review FAIL conditionnel: 4 majeurs (race condition task registration, SSE disconnect leak, store lock encapsulation, session factory fragile) + 6 mineurs (stage_started timing, TTL default, singleton test fragility). Phase 10 remédiation ajoutée."
    type: "decision"
    date: "2026-04-28"
  - text: "Finding #2 (session factory from request-scoped db) reporté: risque faible car db.bind est toujours le long-lived engine. Sera traité en follow-up si le pattern change."
    type: "retro"
