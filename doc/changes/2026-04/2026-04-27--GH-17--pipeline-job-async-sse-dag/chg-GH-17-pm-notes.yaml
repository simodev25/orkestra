decisions:
  - text: "Adopter job async + SSE + DAG (recommandation @architect) plutôt qu'un patch transitoire. Justification: le pipeline 3-5min en HTTP sync n'est pas scalable et les timeouts ne fonctionnent pas correctement avec l'event loop uvicorn."
    date: "2026-04-27"
  - text: "Maintenir rétrocompatibilité sur POST /{id}/chat pour ne pas casser les clients existants."
    date: "2026-04-27"

