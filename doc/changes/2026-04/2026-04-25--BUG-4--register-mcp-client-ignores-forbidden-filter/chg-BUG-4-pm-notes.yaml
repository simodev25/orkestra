decisions:
  - text: >
      Root cause confirmed by inspecting AgentScope Toolkit.register_mcp_client signature.
      The method accepts enable_funcs: list[str] | None — if None (current code), ALL tools
      from the MCP server are re-registered, bypassing our mcp_tools filter.
      Fix: pass enable_funcs=[t.name for t in mcp_tools] to register_mcp_client.
      This is the actual enforcement gap that allows write_doc to be called despite forbidden_effects.
      BUG-2 and BUG-3 fixed the config and the gate condition, but not the registration call itself.
    date: "2026-04-25"

open_questions: []
blockers: []

notes:
  - text: "User confirmed bypass still works despite full forbidden_effects list. Root cause is in register_mcp_client call missing enable_funcs parameter."
    type: info
    date: "2026-04-25"
