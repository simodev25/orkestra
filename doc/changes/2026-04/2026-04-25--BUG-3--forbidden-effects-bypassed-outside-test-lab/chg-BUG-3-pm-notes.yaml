decisions:
  - text: >
      Root cause confirmed via code inspection. Three findings:
      (1) guarded_mcp_executor.py is dead code — never called anywhere.
      (2) agent_factory.py enforcement gated on `test_run_id and db` — only fires in Test Lab runs.
          Callers: subagent_executor.py calls create_agentscope_agent WITHOUT test_run_id → no enforcement.
      (3) EffectClassifier has process-level cache per tool_name — stale classifications persist until restart.
      Fix strategy: make enforcement unconditional in agent_factory.py, remove test_run_id gate.
      guarded_mcp_executor.py can be wired in or removed (TBD in spec).
    date: "2026-04-25"

