server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        http:
          endpoint: "0.0.0.0:4318"
        grpc:
          endpoint: "0.0.0.0:4317"

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

metrics_generator:
  processor:
    span_metrics:
      dimensions:
        - gen_ai.system
        - gen_ai.request.model
        - gen_ai.operation.name
  storage:
    path: /var/tempo/metrics
  traces_storage:
    path: /var/tempo/traces
