# =============================================================================
# Orkestra — Docker Compose (Development)
# =============================================================================
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose up -d --build  # rebuild images
#   docker compose logs -f api    # follow API logs
#   docker compose exec api alembic upgrade head  # run migrations
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orkestra
      POSTGRES_PASSWORD: orkestra
      POSTGRES_DB: orkestra
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orkestra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Obot (MCP source of truth)
  # ---------------------------------------------------------------------------

  obot:
    image: ghcr.io/obot-platform/obot:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8200:8000"
    environment:
      PYTHONPATH: /app
      ORKESTRA_DATABASE_URL: postgresql+asyncpg://orkestra:orkestra@postgres:5432/orkestra
      ORKESTRA_DATABASE_URL_SYNC: postgresql://orkestra:orkestra@postgres:5432/orkestra
      ORKESTRA_REDIS_URL: redis://redis:6379/0
      ORKESTRA_SECRET_KEY: orkestra-dev-secret-change-in-prod
      ORKESTRA_DEBUG: "true"
      ORKESTRA_LOG_LEVEL: INFO
      ORKESTRA_OBOT_BASE_URL: http://obot:8080
      ORKESTRA_OBOT_API_KEY: ""
      ORKESTRA_OBOT_USE_MOCK: "false"
      ORKESTRA_OBOT_FALLBACK_TO_MOCK: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      obot:
        condition: service_started
    volumes:
      - ./app:/app/app:ro
      - ./migrations:/app/migrations:ro
      - ./alembic.ini:/app/alembic.ini:ro
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3300:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
