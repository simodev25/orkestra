# =============================================================================
# Orkestra — Docker Compose (Development)
# =============================================================================
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose up -d --build  # rebuild images
#   docker compose logs -f api    # follow API logs
#   docker compose exec api alembic upgrade head  # run migrations
#
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Infrastructure
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orkestra
      POSTGRES_PASSWORD: orkestra
      POSTGRES_DB: orkestra
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orkestra"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Obot (MCP source of truth)
  # ---------------------------------------------------------------------------

  obot:
    image: ghcr.io/obot-platform/obot:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      # Required by Obot to spawn tool containers (dev only — see audit F12)
      - /var/run/docker.sock:/var/run/docker.sock

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8200:8000"
    environment:
      PYTHONPATH: /app
      ORKESTRA_DATABASE_URL: postgresql+asyncpg://orkestra:orkestra@postgres:5432/orkestra
      ORKESTRA_DATABASE_URL_SYNC: postgresql://orkestra:orkestra@postgres:5432/orkestra
      ORKESTRA_REDIS_URL: redis://redis:6379/0
      ORKESTRA_SECRET_KEY: orkestra-dev-secret-change-in-prod
      ORKESTRA_DEBUG: "true"
      ORKESTRA_LOG_LEVEL: INFO
      ORKESTRA_OBOT_BASE_URL: http://obot:8080
      ORKESTRA_OBOT_API_KEY: ""
      ORKESTRA_OBOT_USE_MOCK: "false"
      ORKESTRA_OBOT_FALLBACK_TO_MOCK: "false"
      ORKESTRA_OTEL_ENDPOINT: http://otel-collector:4318/v1/traces
      ORKESTRA_PROMETHEUS_ENABLED: "true"
      ORKESTRA_DEBUG_STRATEGY_DIR: /app/storage/debug-strategy
      ORKESTRA_TRACE_DIR: /app/storage/debug-scenarios
      ORKESTRA_AUTH_ENABLED: "false"
      ORKESTRA_OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      obot:
        condition: service_started
    volumes:
      - ./app:/app/app:ro
      - ./migrations:/app/migrations:ro
      - ./alembic.ini:/app/alembic.ini:ro
      - ./storage:/app/storage
      - ./debug-strategy:/app/storage/debug-strategy
      - ./debug-scenarios:/app/storage/debug-scenarios
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Celery Worker (test lab agent execution)
  # ---------------------------------------------------------------------------

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=2
    environment:
      PYTHONPATH: /app
      ORKESTRA_DATABASE_URL: postgresql+asyncpg://orkestra:orkestra@postgres:5432/orkestra
      ORKESTRA_DATABASE_URL_SYNC: postgresql://orkestra:orkestra@postgres:5432/orkestra
      ORKESTRA_REDIS_URL: redis://redis:6379/0
      ORKESTRA_SECRET_KEY: orkestra-dev-secret-change-in-prod
      ORKESTRA_DEBUG: "true"
      ORKESTRA_LOG_LEVEL: INFO
      ORKESTRA_OBOT_BASE_URL: http://obot:8080
      ORKESTRA_OBOT_USE_MOCK: "false"
      ORKESTRA_OBOT_FALLBACK_TO_MOCK: "false"
      ORKESTRA_OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro
      - ./storage:/app/storage

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3300:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8200
      API_INTERNAL_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Observability
  # ---------------------------------------------------------------------------

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    restart: unless-stopped
    command: ["--config", "/etc/otel-collector/config.yaml"]
    ports:
      - "4327:4317"   # OTLP gRPC
      - "4328:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro

  tempo:
    image: grafana/tempo:2.5.0
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3250:3200"   # Tempo HTTP API
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempodata:/var/tempo

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    ports:
      - "9190:9090"
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    depends_on:
      - otel-collector

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: orkestra
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - tempo
      - prometheus

volumes:
  pgdata:
  redisdata:
  tempodata:
  promdata:
  grafanadata:
